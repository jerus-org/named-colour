version: 2.1

parameters:
  named_colour_version:
    type: string
    default: ""
    description: "Override named-colour crate version (empty = nextsv auto-detect)"
  workspace_version:
    type: string
    default: ""
    description: "Override workspace v* version (empty = nextsv auto-detect)"

orbs:
  toolkit: jerus-org/circleci-toolkit@4.11.0

jobs:
  tools:
    executor: toolkit/rust_env_rolling
    steps:
      - run:
          name: Verify tools
          command: |
            set -ex
            nextsv --version
            pcu --version
            cargo release --version
            jq --version
            rsign --version

workflows:
  release:
    jobs:
      - tools

      - toolkit/calculate_versions:
          name: calculate-versions
          requires: [tools]
          crates: "named-colour:named-colour-v"
          crate_version_overrides: "named-colour:<< pipeline.parameters.named_colour_version >>"
          workspace_version_override: << pipeline.parameters.workspace_version >>

      - approve-release:
          type: approval
          requires: [calculate-versions]

      - toolkit/release_crate:
          name: release-named-colour
          requires: [approve-release]
          package: named-colour
          crate_tag_prefix: named-colour-v
          context:
            - release
            - bot-check
            - pcu-app

      - toolkit/release_prlog:
          requires: [release-named-colour]
          context:
            - release
            - bot-check
            - pcu-app
